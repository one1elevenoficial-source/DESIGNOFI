<svg width="200" height="240" viewBox="0 0 200 240" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="buildingGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4af37;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0e68c;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur" />
      <feMerge>
        <feMergeNode in="coloredBlur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="strongGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur" />
      <feMerge>
        <feMergeNode in="coloredBlur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Prédio Central - Forma Geométrica Moderna -->
  <!-- Painel Esquerdo -->
  <polygon points="50,80 70,60 70,160 50,180" fill="url(#buildingGrad)" opacity="0.9" filter="url(#glow)" />

  <!-- Painel Direito -->
  <polygon points="130,80 150,60 150,160 130,180" fill="url(#buildingGrad)" opacity="0.9" filter="url(#glow)" />

  <!-- Painel Central Principal -->
  <polygon points="70,50 130,50 130,170 70,170" fill="#d4af37" opacity="0.95" filter="url(#strongGlow)" />

  <!-- Decoração - Linhas Internas (Windows/Efeito) -->
  <line x1="75" y1="70" x2="125" y2="70" stroke="#f0e68c" stroke-width="1.5" opacity="0.6" />
  <line x1="75" y1="90" x2="125" y2="90" stroke="#f0e68c" stroke-width="1.5" opacity="0.6" />
  <line x1="75" y1="110" x2="125" y2="110" stroke="#f0e68c" stroke-width="1.5" opacity="0.6" />
  <line x1="75" y1="130" x2="125" y2="130" stroke="#f0e68c" stroke-width="1.5" opacity="0.6" />
  <line x1="75" y1="150" x2="125" y2="150" stroke="#f0e68c" stroke-width="1.5" opacity="0.6" />

  <!-- Linhas Verticais -->
  <line x1="85" y1="50" x2="85" y2="170" stroke="#f0e68c" stroke-width="1.5" opacity="0.4" />
  <line x1="100" y1="50" x2="100" y2="170" stroke="#f0e68c" stroke-width="1.5" opacity="0.4" />
  <line x1="115" y1="50" x2="115" y2="170" stroke="#f0e68c" stroke-width="1.5" opacity="0.4" />

  <!-- Elemento Brilhante no Topo -->
  <circle cx="100" cy="55" r="4" fill="#fff" opacity="0.8" filter="url(#strongGlow)" />
  <circle cx="70" cy="65" r="3" fill="#fff" opacity="0.6" filter="url(#glow)" />
  <circle cx="130" cy="65" r="3" fill="#fff" opacity="0.6" filter="url(#glow)" />

  <!-- Linha Decorativa Inferior -->
  <line x1="40" y1="195" x2="160" y2="195" stroke="#d4af37" stroke-width="2" opacity="0.7" filter="url(#glow)" />

  <!-- Pontos de Brilho na Linha -->
  <circle cx="100" cy="195" r="2.5" fill="#fff" opacity="0.9" filter="url(#strongGlow)" />
  <circle cx="75" cy="195" r="1.5" fill="#fff" opacity="0.6" filter="url(#glow)" />
  <circle cx="125" cy="195" r="1.5" fill="#fff" opacity="0.6" filter="url(#glow)" />
</svg>